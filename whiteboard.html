<style>
/* Page itself must NOT scroll — only the canvas shell scrolls */
html,body{height:100%;overflow:hidden !important;overscroll-behavior:none}

/* ── shell: this is the scrollable viewport ── */
.wb-shell{
  position:fixed;inset:0;top:var(--nav-h);
  overflow-y:scroll;overflow-x:hidden;
}

/* Canvas is tall enough to scroll */
#wb-canvas{display:block;touch-action:none;cursor:crosshair;width:100%}

/* ── ALL toolbars are position:fixed so they stay on screen while you scroll ── */
.wb-bar{
  position:fixed;left:16px;top:50%;transform:translateY(-50%);
  background:var(--card);border:1px solid var(--bdr);border-radius:14px;
  padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;
  box-shadow:0 4px 24px rgba(0,0,0,0.14);z-index:100;user-select:none;
  transition:opacity .2s,transform .2s
}
.wb-bar.hidden{opacity:0;pointer-events:none;transform:translateY(-50%) translateX(-60px)}

.wbt{
  width:36px;height:36px;border:none;background:transparent;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--fg);transition:background .14s
}
.wbt:hover{background:var(--hover)}
.wbt.on{background:rgba(99,102,241,0.16);color:#6366f1}
.wbt.del:hover{background:rgba(248,113,113,0.15);color:#f87171}
.wbt.fs:hover{background:rgba(52,211,153,0.15);color:#34d399}
.wb-sep{width:22px;height:1px;background:var(--bdr);margin:3px 0}
.wb-lbl{font:9px 'JetBrains Mono',monospace;color:var(--fg2);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}

/* ink colour dots */
.wbd{
  width:22px;height:22px;border-radius:50%;border:2.5px solid transparent;
  cursor:pointer;transition:transform .14s,border-color .14s;flex-shrink:0
}
.wbd:hover{transform:scale(1.2)}
.wbd.on{border-color:var(--fg)}

/* BG colour squares */
.wbg{
  width:20px;height:20px;border-radius:5px;border:2px solid transparent;
  cursor:pointer;transition:transform .14s,border-color .14s;flex-shrink:0
}
.wbg:hover{transform:scale(1.18)}
.wbg.on{border-color:var(--fg)}

/* ── top size / status bar ── */
.wb-top{
  position:fixed;top:calc(var(--nav-h) + 14px);left:50%;transform:translateX(-50%);
  background:var(--card);border:1px solid var(--bdr);border-radius:10px;
  padding:6px 14px;display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 16px rgba(0,0,0,0.1);z-index:100;white-space:nowrap;user-select:none;
  transition:opacity .2s,transform .2s
}
.wb-top.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(-50px)}

.wbs{
  width:30px;height:30px;border:1.5px solid var(--bdr);border-radius:7px;
  background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .14s,border-color .14s
}
.wbs:hover{background:var(--hover)}
.wbs.on{border-color:#6366f1;background:rgba(99,102,241,0.12)}
.wb-vd{width:1px;height:20px;background:var(--bdr)}
.wb-st{font:11px 'JetBrains Mono',monospace;color:var(--fg2)}

/* ── window buttons top-right ── */
.wb-win-btns{
  position:fixed;top:calc(var(--nav-h) + 14px);right:16px;z-index:100;
  display:flex;gap:6px;align-items:center
}
.wb-wbtn{
  width:30px;height:30px;border:1px solid var(--bdr);border-radius:8px;
  background:var(--card);cursor:pointer;color:var(--fg);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.10);transition:background .14s
}
.wb-wbtn:hover{background:var(--hover)}
.wb-wbtn.restore{
  position:fixed;top:calc(var(--nav-h) + 14px);right:16px;z-index:110;
  display:none
}
.wb-wbtn.restore.show{display:flex}

/* ── scroll-to-top button (appears after scrolling down) ── */
#wb-totop{
  position:fixed;bottom:60px;right:16px;z-index:100;
  width:34px;height:34px;border:1px solid var(--bdr);border-radius:9px;
  background:var(--card);cursor:pointer;color:var(--fg);
  display:none;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.12);transition:background .14s
}
#wb-totop.show{display:flex}
#wb-totop:hover{background:var(--hover)}

/* ── toast ── */
.wb-toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  background:var(--card);border:1px solid var(--bdr);border-radius:8px;
  padding:8px 18px;font:12px 'JetBrains Mono',monospace;color:var(--fg);
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap
}
.wb-toast.show{opacity:1}

/* cursor when erasing */
#wb-canvas.erasing{cursor:cell}

/* ── ruler overlay ── */
#wb-ruler-overlay{
  position:absolute;top:0;left:0;
  width:100%;height:4000px;
  pointer-events:none;        /* never blocks drawing */
  display:none;z-index:2;
}
#wb-ruler-overlay.on{ display:block }
.wbt.ruler-on{background:rgba(99,102,241,0.16);color:#6366f1}
</style>
</head>

<script>
(function(){
  const canvas  = document.getElementById('wb-canvas');
  const ctx     = canvas.getContext('2d');
  const shell   = document.getElementById('wb-shell');
  const stEl    = document.getElementById('wb-st');
  const toastEl  = document.getElementById('wb-toast');
  const barEl    = document.getElementById('wb-bar');
  const topEl    = document.getElementById('wb-top');
  const winBtns  = document.getElementById('wb-win-btns');
  const restBtn  = document.getElementById('wb-restore');
  const totopBtn = document.getElementById('wb-totop');
  const rulerEl  = document.getElementById('wb-ruler-overlay');

  const LS_KEY    = 'cwv-whiteboard-v1';
  const LS_BG_KEY = 'cwv-whiteboard-bg-v1';
  const MAX_UND   = 25;
  const CANVAS_H  = 4000;   /* tall canvas — scroll down to draw more */

  const COLORS = [
    {hex:'#ffffff', label:'White'},
    {hex:'#1a1a2e', label:'Black'},
    {hex:'#f87171', label:'Red'},
    {hex:'#34d399', label:'Green'},
  ];

  const BG_COLORS = [
    {hex:'#09090c', label:'Dark'},
    {hex:'#4b5563', label:'Grey'},
    {hex:'#ffffff', label:'White'},
  ];

  let tool = 'pen', color = '#1a1a2e', size = 3;
  let bgColor = '#ffffff';
  let drawing = false, W = 0;
  let undoStack = [], redoStack = [];
  let saveTimer, toastTimer;
  let isMinimized = false;
  let rulerOn = false;

  /* restore saved bg */
  const savedBG = localStorage.getItem(LS_BG_KEY);
  if(savedBG) bgColor = savedBG;

  /* ── ink swatches ── */
  const colWrap = document.getElementById('wb-colors');
  COLORS.forEach(({hex, label}) => {
    const d = document.createElement('div');
    d.className = 'wbd';
    d.style.background = hex;
    d.dataset.c = hex;
    d.title = label;
    if(hex === '#f8fafc') d.style.boxShadow = 'inset 0 0 0 1px rgba(0,0,0,0.18)';
    d.addEventListener('click', () => setColor(hex));
    colWrap.appendChild(d);
  });

  /* ── BG swatches ── */
  const bgWrap = document.getElementById('wb-bg-colors');
  BG_COLORS.forEach(({hex, label}) => {
    const d = document.createElement('div');
    d.className = 'wbg';
    d.style.background = hex;
    d.dataset.bg = hex;
    d.title = label;
    if(['#ffffff','#f8fafc','#fef9ee','#eef2ff'].includes(hex))
      d.style.boxShadow = 'inset 0 0 0 1px rgba(0,0,0,0.15)';
    d.addEventListener('click', () => setBgColor(hex));
    bgWrap.appendChild(d);
  });
  syncBgSwatches();

  /* ── helpers ── */
  function isDark(){ return document.documentElement.getAttribute('data-theme') === 'dark'; }

  function setColor(c){
    color = c;
    colWrap.querySelectorAll('.wbd').forEach(d => d.classList.toggle('on', d.dataset.c === c));
    setTool('pen');
  }

  function setBgColor(c){
    bgColor = c;
    syncBgSwatches();
    snapshot();
    redoStack = [];
    paintBG();
    undoStack.push(canvas.toDataURL('image/jpeg', 0.72));
    scheduleSave();
    localStorage.setItem(LS_BG_KEY, c);
    updateRulerStyle(); /* re-colour lines for new bg */
    toast('Background changed');
  }

  /* ── ruler lines ── */
  function toggleRuler(){
    rulerOn = !rulerOn;
    rulerEl.classList.toggle('on', rulerOn);
    document.getElementById('wb-ruler').classList.toggle('ruler-on', rulerOn);
    updateRulerStyle();
    toast(rulerOn ? 'Ruler lines on' : 'Ruler lines off');
  }

  function updateRulerStyle(){
    /* choose line colour that contrasts with the current background */
    const dark = ['#09090c','#1e1e2e','#4b5563'];
    const lineColor = dark.includes(bgColor)
      ? 'rgba(255,255,255,0.15)'
      : 'rgba(0,0,0,0.13)';
    rulerEl.style.backgroundImage =
      `repeating-linear-gradient(to bottom,
        transparent 0px, transparent 31px,
        ${lineColor} 31px, ${lineColor} 32px)`;
  }

  function syncBgSwatches(){
    bgWrap.querySelectorAll('.wbg').forEach(d => d.classList.toggle('on', d.dataset.bg === bgColor));
  }

  function setTool(t){
    tool = t;
    document.getElementById('tool-pen').classList.toggle('on', t === 'pen');
    document.getElementById('tool-eraser').classList.toggle('on', t === 'eraser');
    canvas.className = t === 'eraser' ? 'erasing' : '';
  }

  function strokeColor(){ return tool === 'eraser' ? bgColor : color; }
  function strokeSize() { return tool === 'eraser' ? size * 5 : size; }

  /* ── size buttons ── */
  document.querySelectorAll('.wbs').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.wbs').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      size = +btn.dataset.sz;
    });
  });

  /* ── toolbar actions ── */
  document.getElementById('tool-pen').addEventListener('click', () => setTool('pen'));
  document.getElementById('tool-eraser').addEventListener('click', () => setTool('eraser'));
  document.getElementById('wb-undo').addEventListener('click', undo);
  document.getElementById('wb-redo').addEventListener('click', redo);
  document.getElementById('wb-clear').addEventListener('click', clearAll);
  document.getElementById('wb-export').addEventListener('click', exportPNG);
  document.getElementById('wb-fullscreen').addEventListener('click', toggleFullscreen);
  document.getElementById('wb-maximize').addEventListener('click', toggleFullscreen);
  document.getElementById('wb-ruler').addEventListener('click', toggleRuler);
  document.getElementById('wb-minimize').addEventListener('click', minimize);
  document.getElementById('wb-restore').addEventListener('click', restore);
  totopBtn.addEventListener('click', () => shell.scrollTo({top:0, behavior:'smooth'}));

  /* ── scroll-to-top visibility ── */
  shell.addEventListener('scroll', () => {
    totopBtn.classList.toggle('show', shell.scrollTop > 200);
  });

  /* ── minimize / restore toolbar ── */
  function minimize(){
    isMinimized = true;
    barEl.classList.add('hidden');
    topEl.classList.add('hidden');
    winBtns.style.display = 'none';
    restBtn.classList.add('show');
    toast('Toolbar hidden — click to restore  [M]');
  }
  function restore(){
    isMinimized = false;
    barEl.classList.remove('hidden');
    topEl.classList.remove('hidden');
    winBtns.style.display = 'flex';
    restBtn.classList.remove('show');
  }

  /* ── fullscreen ── */
  const maxIcon = document.getElementById('wb-max-icon');
  const ICON_EXPAND = `<polyline points="1,5 1,1 5,1"/><polyline points="11,1 15,1 15,5"/><polyline points="15,11 15,15 11,15"/><polyline points="5,15 1,15 1,11"/>`;
  const ICON_SHRINK = `<polyline points="1,5 5,5 5,1"/><polyline points="11,1 11,5 15,5"/><polyline points="15,11 11,11 11,15"/><polyline points="5,15 5,11 1,11"/>`;

  function toggleFullscreen(){
    if(!document.fullscreenElement)
      document.documentElement.requestFullscreen().catch(()=>toast('Fullscreen blocked'));
    else
      document.exitFullscreen();
  }
  document.addEventListener('fullscreenchange', () => {
    const fs = !!document.fullscreenElement;
    maxIcon.innerHTML = fs ? ICON_SHRINK : ICON_EXPAND;
    document.getElementById('wb-fullscreen').innerHTML =
      `<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5">${fs ? ICON_SHRINK : ICON_EXPAND}</svg>`;
    setTimeout(resize, 120);
  });

  /* ── keyboard shortcuts ── */
  document.addEventListener('keydown', e => {
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const k = e.key.toLowerCase();
    if(!e.ctrlKey && !e.metaKey){
      if(k==='p') setTool('pen');
      if(k==='e') setTool('eraser');
      if(k==='[') cycleSizeDown();
      if(k===']') cycleSizeUp();
      if(k==='f') toggleFullscreen();
      if(k==='m') isMinimized ? restore() : minimize();
      if(k==='r') toggleRuler();
    }
    if((e.ctrlKey||e.metaKey) && k==='z'){ e.preventDefault(); undo(); }
    if((e.ctrlKey||e.metaKey) && (k==='y'||(e.shiftKey&&k==='z'))){ e.preventDefault(); redo(); }
  });

  function cycleSizeDown(){
    const s=[3,8,18], i=s.indexOf(size);
    if(i>0){ size=s[i-1]; syncSizeBtns(); }
  }
  function cycleSizeUp(){
    const s=[3,8,18], i=s.indexOf(size);
    if(i<s.length-1){ size=s[i+1]; syncSizeBtns(); }
  }
  function syncSizeBtns(){
    document.querySelectorAll('.wbs').forEach(b => b.classList.toggle('on', +b.dataset.sz===size));
  }

  /* ── drawing ──
     getBoundingClientRect().top is negative when canvas has been scrolled up,
     so clientY - r.top correctly maps to the canvas Y coordinate at any scroll. */
  function getXY(e){
    const r = canvas.getBoundingClientRect();
    const s = e.touches ? e.touches[0] : e;
    return { x: s.clientX - r.left, y: s.clientY - r.top };
  }

  function startDraw(e){
    if(e.touches && e.touches.length > 1) return;
    e.preventDefault();
    snapshot();
    redoStack = [];
    drawing = true;
    const {x,y} = getXY(e);
    ctx.beginPath();
    ctx.arc(x, y, Math.max(1, strokeSize()/2), 0, Math.PI*2);
    ctx.fillStyle = strokeColor();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x, y);
  }

  function moveDraw(e){
    if(!drawing) return;
    if(e.touches && e.touches.length > 1) return;
    e.preventDefault();
    const {x,y} = getXY(e);
    ctx.lineTo(x, y);
    ctx.strokeStyle = strokeColor();
    ctx.lineWidth   = strokeSize();
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y);
  }

  function endDraw(){
    if(!drawing) return;
    drawing = false;
    scheduleSave();
  }

  /* ── undo / redo ── */
  function snapshot(){
    undoStack.push(canvas.toDataURL('image/jpeg', 0.72));
    if(undoStack.length > MAX_UND) undoStack.shift();
  }

  function restoreFromURL(url, cb){
    const img = new Image();
    img.onload = () => { paintBG(); ctx.drawImage(img, 0, 0, W, CANVAS_H); if(cb) cb(); };
    img.src = url;
  }

  function undo(){
    if(undoStack.length < 2){ toast('Nothing to undo'); return; }
    redoStack.push(undoStack.pop());
    restoreFromURL(undoStack[undoStack.length-1], scheduleSave);
  }
  function redo(){
    if(!redoStack.length){ toast('Nothing to redo'); return; }
    const url = redoStack.pop();
    undoStack.push(url);
    restoreFromURL(url, scheduleSave);
  }

  /* ── clear ── */
  function clearAll(){
    if(!confirm('Clear the entire whiteboard?')) return;
    snapshot();
    redoStack = [];
    paintBG();
    scheduleSave();
    toast('Canvas cleared');
  }

  /* ── export ── */
  function exportPNG(){
    const tmp = document.createElement('canvas');
    tmp.width = W; tmp.height = CANVAS_H;
    const tc = tmp.getContext('2d');
    tc.fillStyle = bgColor;
    tc.fillRect(0, 0, W, CANVAS_H);
    tc.drawImage(canvas, 0, 0);
    const a = document.createElement('a');
    a.download = 'whiteboard-cwv.png';
    a.href = tmp.toDataURL('image/png');
    a.click();
    toast('Saved as whiteboard-cwv.png');
  }

  /* ── persistence ── */
  function scheduleSave(){
    clearTimeout(saveTimer);
    stEl.textContent = 'saving…';
    saveTimer = setTimeout(() => {
      try {
        localStorage.setItem(LS_KEY, canvas.toDataURL('image/jpeg', 0.75));
        stEl.textContent = 'saved ✓';
      } catch(ex){
        stEl.textContent = 'storage full — export to keep';
        toast('LocalStorage full — download PNG to save');
      }
    }, 800);
  }

  function loadSaved(){
    const saved = localStorage.getItem(LS_KEY);
    if(!saved){ undoStack.push(canvas.toDataURL('image/jpeg', 0.72)); return; }
    restoreFromURL(saved, () => {
      undoStack.push(canvas.toDataURL('image/jpeg', 0.72));
      stEl.textContent = 'saved ✓';
    });
  }

  /* ── background ── */
  function paintBG(){
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, W, CANVAS_H);
  }

  /* ── resize (only re-init when viewport WIDTH changes) ── */
  function resize(){
    const newW = shell.clientWidth;
    if(newW === W) return;
    const prev = W > 0 ? canvas.toDataURL() : null;
    W = newW;
    canvas.width  = W;
    canvas.height = CANVAS_H;
    undoStack = []; redoStack = [];
    paintBG();
    if(prev){
      restoreFromURL(prev, () => undoStack.push(canvas.toDataURL('image/jpeg', 0.72)));
    } else {
      loadSaved();
    }
  }

  /* ── canvas events ── */
  canvas.addEventListener('mousedown',  startDraw);
  canvas.addEventListener('mousemove',  moveDraw);
  canvas.addEventListener('mouseup',    endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('touchstart', startDraw, {passive:false});
  canvas.addEventListener('touchmove',  moveDraw,  {passive:false});
  canvas.addEventListener('touchend',   endDraw);

  /* ── init ── */
  window.addEventListener('resize', resize);
  if(!savedBG) bgColor = '#09090c';
  syncBgSwatches();
  setColor('#ffffff');   /* default pen = white on dark bg */
  updateRulerStyle();
  resize();
})();
</script>
</body>
</html>
