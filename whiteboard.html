<style>
html,body{height:100%;overflow:hidden}
.wb-shell{position:fixed;inset:0;top:var(--nav-h);display:flex;overflow:hidden}
#wb-canvas{display:block;flex:1;touch-action:none}

/* ── left toolbar ── */
.wb-bar{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  background:var(--card);border:1px solid var(--bdr);border-radius:14px;
  padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;
  box-shadow:0 4px 24px rgba(0,0,0,0.14);z-index:20;user-select:none
}
.wbt{
  width:36px;height:36px;border:none;background:transparent;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--fg);transition:background .14s
}
.wbt:hover{background:var(--hover)}
.wbt.on{background:rgba(99,102,241,0.16);color:#6366f1}
.wbt.del:hover{background:rgba(248,113,113,0.15);color:#f87171}
.wb-sep{width:22px;height:1px;background:var(--bdr);margin:3px 0}
.wbd{
  width:22px;height:22px;border-radius:50%;border:2.5px solid transparent;
  cursor:pointer;transition:transform .14s,border-color .14s;flex-shrink:0
}
.wbd:hover{transform:scale(1.2)}
.wbd.on{border-color:var(--fg)}

/* ── top size bar ── */
.wb-top{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  background:var(--card);border:1px solid var(--bdr);border-radius:10px;
  padding:6px 14px;display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 16px rgba(0,0,0,0.1);z-index:20;white-space:nowrap;user-select:none
}
.wbs{
  width:30px;height:30px;border:1.5px solid var(--bdr);border-radius:7px;
  background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .14s,border-color .14s
}
.wbs:hover{background:var(--hover)}
.wbs.on{border-color:#6366f1;background:rgba(99,102,241,0.12)}
.wb-vd{width:1px;height:20px;background:var(--bdr)}
.wb-st{font:11px 'JetBrains Mono',monospace;color:var(--fg2)}

/* ── toast ── */
.wb-toast{
  position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
  background:var(--card);border:1px solid var(--bdr);border-radius:8px;
  padding:8px 18px;font:12px 'JetBrains Mono',monospace;color:var(--fg);
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:50;white-space:nowrap
}
.wb-toast.show{opacity:1}

/* ── eraser cursor hint ── */
#wb-canvas.erasing{cursor:cell}
</style>
</head>

<div class="wb-shell" id="wb-shell">
  <canvas id="wb-canvas"></canvas>

  <!-- Left toolbar -->
  <div class="wb-bar">
    <!-- tools -->
    <button class="wbt on" id="tool-pen" title="Pen  [P]">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M11.5 2.5l2 2-9 9-2.5.5.5-2.5 9-9z"/>
        <line x1="9.5" y1="4.5" x2="11.5" y2="6.5"/>
      </svg>
    </button>
    <button class="wbt" id="tool-eraser" title="Eraser  [E]">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M13 4l-7 8H3l-.5-2 7-8 3.5 2z"/>
        <line x1="2" y1="13" x2="14" y2="13"/>
      </svg>
    </button>

    <div class="wb-sep"></div>

    <!-- color swatches (injected by JS) -->
    <div id="wb-colors" style="display:flex;flex-direction:column;gap:5px;align-items:center"></div>

    <div class="wb-sep"></div>

    <!-- actions -->
    <button class="wbt" id="wb-undo" title="Undo  [Ctrl+Z]">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 6.5A5 5 0 1 1 6 11"/><polyline points="4,3.5 4,6.5 7,6.5"/>
      </svg>
    </button>
    <button class="wbt" id="wb-redo" title="Redo  [Ctrl+Y]">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 6.5A5 5 0 1 0 10 11"/><polyline points="12,3.5 12,6.5 9,6.5"/>
      </svg>
    </button>
    <button class="wbt del" id="wb-clear" title="Clear all">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="2,4 14,4"/>
        <path d="M5 4V3h6v1"/>
        <rect x="3.5" y="4" width="9" height="9" rx="1"/>
        <line x1="6.5" y1="7" x2="6.5" y2="10"/>
        <line x1="9.5" y1="7" x2="9.5" y2="10"/>
      </svg>
    </button>
    <button class="wbt" id="wb-export" title="Download PNG">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 2v8"/><polyline points="5,7 8,10 11,7"/>
        <path d="M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/>
      </svg>
    </button>
  </div>

  <!-- Top size / status bar -->
  <div class="wb-top">
    <button class="wbs on" data-sz="3" title="Fine stroke">
      <svg viewBox="0 0 20 20" width="20" height="20"><circle cx="10" cy="10" r="1.8" fill="currentColor"/></svg>
    </button>
    <button class="wbs" data-sz="8" title="Medium stroke">
      <svg viewBox="0 0 20 20" width="20" height="20"><circle cx="10" cy="10" r="4.5" fill="currentColor"/></svg>
    </button>
    <button class="wbs" data-sz="18" title="Thick stroke">
      <svg viewBox="0 0 20 20" width="20" height="20"><circle cx="10" cy="10" r="8" fill="currentColor"/></svg>
    </button>
    <div class="wb-vd"></div>
    <span class="wb-st" id="wb-st">drawing saved in your browser</span>
  </div>

  <div class="wb-toast" id="wb-toast"></div>

<script src="assets/js/main.js"></script>
<script>
(function(){
  const canvas  = document.getElementById('wb-canvas');
  const ctx     = canvas.getContext('2d');
  const shell   = document.getElementById('wb-shell');
  const stEl    = document.getElementById('wb-st');
  const toastEl = document.getElementById('wb-toast');

  const LS_KEY  = 'cwv-whiteboard-v1';
  const MAX_UND = 25;
  const COLORS  = [
    {hex:'#1a1a2e', label:'Ink'},
    {hex:'#f8fafc', label:'White'},
    {hex:'#6366f1', label:'Indigo'},
    {hex:'#34d399', label:'Green'},
    {hex:'#fbbf24', label:'Amber'},
    {hex:'#60a5fa', label:'Blue'},
    {hex:'#f472b6', label:'Pink'},
    {hex:'#f87171', label:'Red'},
  ];

  let tool = 'pen', color = '#1a1a2e', size = 3;
  let drawing = false, W = 0, H = 0;
  let undoStack = [], redoStack = [];
  let saveTimer, toastTimer;

  /* ── color swatches ── */
  const colWrap = document.getElementById('wb-colors');
  COLORS.forEach(({hex, label}) => {
    const d = document.createElement('div');
    d.className = 'wbd';
    d.style.background = hex;
    d.dataset.c = hex;
    d.title = label;
    if(hex === '#f8fafc') d.style.boxShadow = 'inset 0 0 0 1px rgba(0,0,0,0.18)';
    d.addEventListener('click', () => setColor(hex));
    colWrap.appendChild(d);
  });

  /* ── helpers ── */
  function isDark(){ return document.documentElement.getAttribute('data-theme') === 'dark'; }

  function setColor(c){
    color = c;
    colWrap.querySelectorAll('.wbd').forEach(d => d.classList.toggle('on', d.dataset.c === c));
    setTool('pen');
  }

  function setTool(t){
    tool = t;
    document.getElementById('tool-pen').classList.toggle('on', t === 'pen');
    document.getElementById('tool-eraser').classList.toggle('on', t === 'eraser');
    canvas.className = t === 'eraser' ? 'erasing' : '';
  }

  function strokeColor(){
    return tool === 'eraser' ? (isDark() ? '#09090c' : '#ffffff') : color;
  }

  function strokeSize(){
    return tool === 'eraser' ? size * 5 : size;
  }

  /* ── size buttons ── */
  document.querySelectorAll('.wbs').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.wbs').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      size = +btn.dataset.sz;
    });
  });

  /* ── toolbar ── */
  document.getElementById('tool-pen').addEventListener('click', () => setTool('pen'));
  document.getElementById('tool-eraser').addEventListener('click', () => setTool('eraser'));
  document.getElementById('wb-undo').addEventListener('click', undo);
  document.getElementById('wb-redo').addEventListener('click', redo);
  document.getElementById('wb-clear').addEventListener('click', clearAll);
  document.getElementById('wb-export').addEventListener('click', exportPNG);

  /* ── keyboard shortcuts ── */
  document.addEventListener('keydown', e => {
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const k = e.key.toLowerCase();
    if(!e.ctrlKey && !e.metaKey){
      if(k === 'p') setTool('pen');
      if(k === 'e') setTool('eraser');
      if(k === '[') cycleSizeDown();
      if(k === ']') cycleSizeUp();
    }
    if((e.ctrlKey || e.metaKey) && k === 'z'){ e.preventDefault(); undo(); }
    if((e.ctrlKey || e.metaKey) && (k === 'y' || (e.shiftKey && k === 'z'))){ e.preventDefault(); redo(); }
  });

  function cycleSizeDown(){
    const sizes = [3,8,18], cur = sizes.indexOf(size);
    if(cur > 0){ size = sizes[cur-1]; syncSizeBtns(); }
  }
  function cycleSizeUp(){
    const sizes = [3,8,18], cur = sizes.indexOf(size);
    if(cur < sizes.length-1){ size = sizes[cur+1]; syncSizeBtns(); }
  }
  function syncSizeBtns(){
    document.querySelectorAll('.wbs').forEach(b => b.classList.toggle('on', +b.dataset.sz === size));
  }

  /* ── drawing ── */
  function getXY(e){
    const r = canvas.getBoundingClientRect();
    const s = e.touches ? e.touches[0] : e;
    return { x: s.clientX - r.left, y: s.clientY - r.top };
  }

  function startDraw(e){
    if(e.touches && e.touches.length > 1) return;
    e.preventDefault();
    snapshot();
    redoStack = [];
    drawing = true;
    const {x,y} = getXY(e);
    /* draw a dot at click point */
    ctx.beginPath();
    ctx.arc(x, y, Math.max(1, strokeSize() / 2), 0, Math.PI * 2);
    ctx.fillStyle = strokeColor();
    ctx.fill();
    /* start path for continuous line */
    ctx.beginPath();
    ctx.moveTo(x, y);
  }

  function moveDraw(e){
    if(!drawing) return;
    if(e.touches && e.touches.length > 1) return;
    e.preventDefault();
    const {x,y} = getXY(e);
    ctx.lineTo(x, y);
    ctx.strokeStyle = strokeColor();
    ctx.lineWidth   = strokeSize();
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y);
  }

  function endDraw(){
    if(!drawing) return;
    drawing = false;
    scheduleSave();
  }

  /* ── undo / redo ── */
  function snapshot(){
    undoStack.push(canvas.toDataURL('image/jpeg', 0.72));
    if(undoStack.length > MAX_UND) undoStack.shift();
  }

  function restoreFromURL(url, cb){
    const img = new Image();
    img.onload = () => {
      paintBG();
      ctx.drawImage(img, 0, 0, W, H);
      if(cb) cb();
    };
    img.src = url;
  }

  function undo(){
    if(undoStack.length < 2){ toast('Nothing to undo'); return; }
    redoStack.push(undoStack.pop());
    restoreFromURL(undoStack[undoStack.length - 1], scheduleSave);
  }

  function redo(){
    if(!redoStack.length){ toast('Nothing to redo'); return; }
    const url = redoStack.pop();
    undoStack.push(url);
    restoreFromURL(url, scheduleSave);
  }

  /* ── clear ── */
  function clearAll(){
    if(!confirm('Clear the entire whiteboard?')) return;
    snapshot();
    redoStack = [];
    paintBG();
    scheduleSave();
    toast('Canvas cleared');
  }

  /* ── export ── */
  function exportPNG(){
    /* Export with solid background regardless of canvas BG */
    const tmp = document.createElement('canvas');
    tmp.width = W; tmp.height = H;
    const tc = tmp.getContext('2d');
    tc.fillStyle = isDark() ? '#09090c' : '#ffffff';
    tc.fillRect(0, 0, W, H);
    tc.drawImage(canvas, 0, 0);
    const a = document.createElement('a');
    a.download = 'whiteboard-cwv.png';
    a.href = tmp.toDataURL('image/png');
    a.click();
    toast('Saved as whiteboard-cwv.png');
  }

  /* ── persistence ── */
  function scheduleSave(){
    clearTimeout(saveTimer);
    stEl.textContent = 'saving…';
    saveTimer = setTimeout(() => {
      try {
        localStorage.setItem(LS_KEY, canvas.toDataURL('image/jpeg', 0.75));
        stEl.textContent = 'saved in your browser ✓';
      } catch(ex){
        stEl.textContent = 'storage full — export to keep';
        toast('LocalStorage full — download your PNG to save a copy');
      }
    }, 800);
  }

  function loadSaved(){
    const saved = localStorage.getItem(LS_KEY);
    if(!saved){
      undoStack.push(canvas.toDataURL('image/jpeg', 0.72));
      return;
    }
    restoreFromURL(saved, () => {
      undoStack.push(canvas.toDataURL('image/jpeg', 0.72));
      stEl.textContent = 'saved in your browser ✓';
    });
  }

  /* ── canvas background ── */
  function paintBG(){
    ctx.fillStyle = isDark() ? '#09090c' : '#ffffff';
    ctx.fillRect(0, 0, W, H);
  }

  /* ── resize ── */
  function resize(){
    const r = shell.getBoundingClientRect();
    if(r.width === W && r.height === H) return;
    const prev = W > 0 ? canvas.toDataURL() : null;
    W = r.width; H = r.height;
    canvas.width  = W;
    canvas.height = H;
    undoStack = []; redoStack = [];
    paintBG();
    if(prev){
      restoreFromURL(prev, () => undoStack.push(canvas.toDataURL('image/jpeg', 0.72)));
    } else {
      loadSaved();
    }
  }

  /* ── toast ── */
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
  }

  /* ── canvas events ── */
  canvas.addEventListener('mousedown',  startDraw);
  canvas.addEventListener('mousemove',  moveDraw);
  canvas.addEventListener('mouseup',    endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('touchstart', startDraw, {passive: false});
  canvas.addEventListener('touchmove',  moveDraw,  {passive: false});
  canvas.addEventListener('touchend',   endDraw);

  /* ── init ── */
  window.addEventListener('resize', resize);
  setColor(isDark() ? '#f8fafc' : '#1a1a2e');
  resize();
})();
</script>
